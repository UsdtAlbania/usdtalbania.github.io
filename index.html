<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Albania - Live Trading</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e11; color: white; margin: 0; overflow-x: hidden; }
        .auth-container { max-width: 350px; margin: 80px auto; padding: 30px; background: #1e2329; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #474d57; background: #2b3139; color: white; outline: none; }
        input:focus { border-color: #f0b90b; }
        button { width: 95%; padding: 12px; background: #f0b90b; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.3s; }
        button:hover { background: #d9a508; }
        #main-app { display: none; }
        .header { background: #181a20; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b3139; }
        .grid { display: grid; grid-template-columns: 1fr 340px; gap: 15px; padding: 20px; }
        .trade-panel { background: #1e2329; padding: 20px; border-radius: 12px; border: 1px solid #2b3139; }
        .balance-box { background: #2b3139; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #f0b90b; }
        .price-display { font-size: 28px; color: #f0b90b; font-weight: bold; margin: 10px 0; letter-spacing: 1px; }
        .buy-btn { background: #0ecb81; color: white; margin-top: 10px; }
        .buy-btn:hover { background: #0ba368; }
        .sell-btn { background: #f6465d; color: white; margin-top: 10px; }
        .sell-btn:hover { background: #d43d50; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-container">
        <h1 style="color: #f0b90b; margin-top: 0;">USDT Albania</h1>
        <p style="color: #848e9c;">Shkruaj një emër për të hyrë në Demo</p>
        <input type="text" id="username" placeholder="Emri juaj...">
        <button onclick="handleAuth()">HYR TANI</button>
    </div>

    <div id="main-app">
        <div class="header">
            <div><strong style="color: #f0b90b; font-size: 20px;">USDT Albania</strong></div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span>Përdoruesi: <b id="user-display" style="color: #f0b90b;"></b></span>
                <button onclick="logout()" style="width: auto; background: #353945; padding: 5px 12px; font-size: 12px;">DIL</button>
            </div>
        </div>

        <div class="grid">
            <div id="tradingview_chart" style="height: 600px; border-radius: 12px; overflow: hidden;"></div>

            <div class="trade-panel">
                <div class="balance-box">
                    <small style="color: #848e9c; text-transform: uppercase;">Portofoli Euro</small>
                    <h2 id="balance-eur" style="margin: 5px 0;">0.00 €</h2>
                </div>
                
                <div class="balance-box" style="border-left-color: #0ecb81;">
                    <small style="color: #848e9c; text-transform: uppercase;">Mjetet BTC</small>
                    <h2 id="balance-btc" style="margin: 5px 0;">0.000000</h2>
                </div>

                <div style="margin: 20px 0; padding: 10px; border-top: 1px solid #2b3139;">
                    <p style="margin: 0; color: #848e9c; font-size: 14px;">Çmimi Live BTC/EUR</p>
                    <div class="price-display" id="live-price">0.00 €</div>
                </div>

                <label style="font-size: 12px; color: #848e9c;">SHUMA PËR TRANSAKSION (€)</label>
                <input type="number" id="trade-amount" placeholder="Psh: 100" oninput="calculateEstimate()">
                <small id="estimate-text" style="display: block; margin-bottom: 20px; color: #0ecb81; font-weight: bold;">Do marrësh: 0 BTC</small>
                
                <button class="buy-btn" onclick="executeTrade('buy')">BLEJ BTC</button>
                <button class="sell-btn" onclick="executeTrade('sell')">SHIT BTC</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURIMI YT I SAKTË
        const firebaseConfig = {
            apiKey: "AIzaSyC9tqFWgOWD8dSj8UAaGE_RFQnzKjD2mns",
            authDomain: "usdt-albania.firebaseapp.com",
            projectId: "usdt-albania",
            storageBucket: "usdt-albania.firebasestorage.app",
            messagingSenderId: "334664904932",
            appId: "1:334664904932:web:d3c80b79275cd900b43cf1",
            measurementId: "G-CS8QLETQKJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = { eur: 1000, btc: 0 };
        let btcPrice = 0;

        window.handleAuth = async () => {
            const user = document.getElementById('username').value.trim().toLowerCase();
            if(!user) return alert("Ju lutem shkruani një emër!");
            
            const userRef = doc(db, "perdoruesit", user);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                userData = userSnap.data();
            } else {
                userData = { eur: 1000, btc: 0 };
                await setDoc(userRef, userData);
            }

            localStorage.setItem('usdt_user', user);
            startPlatform(user);
        };

        function startPlatform(username) {
            currentUser = username;
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-display').innerText = username;
            
            updateUI();
            loadChart();
            fetchPrice();
            setInterval(fetchPrice, 3000);
        }

        async function fetchPrice() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR');
                const data = await res.json();
                btcPrice = parseFloat(data.price);
                document.getElementById('live-price').innerText = btcPrice.toLocaleString() + " €";
                calculateEstimate();
            } catch (e) { console.log("Price fetch error"); }
        }

        window.executeTrade = async (type) => {
            const amount = parseFloat(document.getElementById('trade-amount').value);
            if(!amount || amount <= 0) return alert("Vendosni një shumë të vlefshme!");

            const userRef = doc(db, "perdoruesit", currentUser);

            if (type === 'buy') {
                if (userData.eur >= amount) {
                    userData.eur -= amount;
                    userData.btc += amount / btcPrice;
                } else { return alert("Bilanc i pamjaftueshëm në Euro!"); }
            } else {
                const btcToSell = amount / btcPrice;
                if (userData.btc >= btcToSell) {
                    userData.eur += amount;
                    userData.btc -= btcToSell;
                } else { return alert("Nuk keni mjaftueshëm BTC!"); }
            }

            await updateDoc(userRef, userData);
            updateUI();
            alert("Transaksioni u krye me sukses!");
        };

        function updateUI() {
            document.getElementById('balance-eur').innerText = userData.eur.toLocaleString(undefined, {minimumFractionDigits: 2}) + " €";
            document.getElementById('balance-btc').innerText = userData.btc.toFixed(6);
        }

        window.calculateEstimate = () => {
            const val = document.getElementById('trade-amount').value;
            if(val && btcPrice) {
                document.getElementById('estimate-text').innerText = "Do marrësh: " + (val / btcPrice).toFixed(6) + " BTC";
            }
        };

        function loadChart() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:BTCEUR",
                "interval": "D",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_chart"
            });
        }

        window.logout = () => { localStorage.clear(); location.reload(); };

        window.onload = () => {
            const saved = localStorage.getItem('usdt_user');
            if(saved) startPlatform(saved);
        };
    </script>
    <script src="https://s3.tradingview.com/tv.js"></script>
</body>
</html>
