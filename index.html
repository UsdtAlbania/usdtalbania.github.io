<!DOCTYPE html>
<html lang="sq" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT Albania Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f0b90b; --gold2: #d4a017;
  --bg: #080a0f; --bg2: #0e1117; --bg3: #141820;
  --panel: #1a1f2e; --panel2: #212840;
  --border: #2a3050; --border2: #354070;
  --up: #00d4a4; --down: #ff4d6d;
  --text: #e8eaf0; --text2: #8892b0; --text3: #4a5580;
  --radius: 12px; --radius2: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --font: 'Syne', sans-serif; --mono: 'Space Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg2);} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:24px;}
#loading img{width:100px;border-radius:50%;border:2px solid var(--gold);box-shadow:0 0 40px rgba(240,185,11,0.3);}
.loader-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--up));border-radius:1px;animation:loadfill 1.5s ease forwards;}
@keyframes loadfill{from{width:0}to{width:100%}}
#loading p{color:var(--text2);font-size:13px;font-family:var(--mono);letter-spacing:2px;}

/* TOAST */
#toast-container{position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 20px;border-radius:var(--radius2);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;animation:slideIn 0.3s ease;box-shadow:var(--shadow);min-width:250px;}
.toast.success{background:rgba(0,212,164,0.15);border:1px solid var(--up);color:var(--up);}
.toast.error{background:rgba(255,77,109,0.15);border:1px solid var(--down);color:var(--down);}
.toast.info{background:rgba(240,185,11,0.15);border:1px solid var(--gold);color:var(--gold);}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}

/* AUTH */
#auth-page{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%, rgba(240,185,11,0.05) 0%, transparent 60%);}
.auth-box{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:var(--shadow);}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-logo img{width:80px;border-radius:50%;border:2px solid var(--gold);margin-bottom:16px;}
.auth-logo h1{font-size:24px;font-weight:800;color:var(--gold);letter-spacing:1px;}
.auth-logo p{color:var(--text2);font-size:13px;margin-top:4px;}
.auth-tabs{display:flex;gap:4px;background:var(--bg2);padding:4px;border-radius:var(--radius2);margin-bottom:28px;}
.auth-tab{flex:1;padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;color:var(--text2);transition:all 0.2s;border:none;background:transparent;}
.auth-tab.active{background:var(--panel2);color:var(--gold);}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600;letter-spacing:0.5px;}
.form-input{width:100%;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border 0.2s;}
.form-input:focus{border-color:var(--gold);}
.btn{width:100%;padding:13px;border:none;border-radius:var(--radius2);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.2s;letter-spacing:0.5px;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);margin-top:8px;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-danger{background:rgba(255,77,109,0.15);border:1px solid var(--down);color:var(--down);}
.btn-sm{padding:8px 16px;font-size:12px;width:auto;}
.forgot-link{text-align:center;margin-top:12px;}
.forgot-link a{color:var(--text2);font-size:12px;cursor:pointer;text-decoration:none;}
