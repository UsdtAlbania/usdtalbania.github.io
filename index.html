<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Binance Demo Trade</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0b0e11; color: white; margin: 0; }
        .auth-container { max-width: 350px; margin: 100px auto; padding: 20px; background: #1e2329; border-radius: 8px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #474d57; background: #2b3139; color: white; }
        button { width: 95%; padding: 10px; background: #f0b90b; border: none; cursor: pointer; font-weight: bold; }
        
        #main-app { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 300px; gap: 10px; padding: 15px; }
        
        /* Paneli i Tregtimit */
        .trade-panel { background: #1e2329; padding: 15px; border-radius: 8px; }
        .balance-box { background: #2b3139; padding: 10px; border-radius: 5px; margin-bottom: 20px; text-align: center; }
        .buy-btn { background: #0ecb81; color: white; margin-bottom: 10px; }
        .sell-btn { background: #f6465d; color: white; }
        .price-display { font-size: 20px; color: #f0b90b; font-weight: bold; margin: 10px 0; }
        
        .header { background: #181a20; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #2b3139; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-container">
        <h2>Binance Demo</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Hyr në Platformë</button>
    </div>

    <div id="main-app">
        <div class="header">
            <div><strong>Demo Exchange</strong> | Mirëseve Erdhe, <span id="user-display"></span></div>
            <button onclick="logout()" style="width: auto; background: transparent; color: #848e9c;">Dil</button>
        </div>

        <div class="grid">
            <div id="tradingview_chart" style="height: 600px;"></div>

            <div class="trade-panel">
                <div class="balance-box">
                    <small>Bilanci yt Demo</small>
                    <h2 id="balance">1000.00</h2> <span>€</span>
                </div>
                
                <div class="balance-box" style="background: #181a20;">
                    <small>Mjetet (BTC):</small>
                    <h2 id="crypto-balance">0.000000</h2>
                </div>

                <p>Çmimi Live BTC/EUR:</p>
                <div class="price-display" id="live-price">Duke u ngarkuar...</div>

                <input type="number" id="amount" placeholder="Shuma në €" oninput="calculateCrypto()">
                <small id="estimate" style="color: #848e9c;">Do marrësh: 0 BTC</small>
                
                <button class="buy-btn" onclick="trade('buy')">BLEJ BTC</button>
                <button class="sell-btn" onclick="trade('sell')">SHIT BTC</button>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let balance = 1000.00;
        let cryptoBalance = 0.00;
        let currentPrice = 0;

        // Merr çmimin live nga një API publike
        async function fetchPrice() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR');
                const data = await response.json();
                currentPrice = parseFloat(data.price);
                document.getElementById('live-price').innerText = currentPrice.toLocaleString() + " €";
            } catch (e) { console.log("Gabim ne marrjen e cmimit"); }
        }
        setInterval(fetchPrice, 3000); // Perditesohet cdo 3 sekonda

        function login() {
            const user = document.getElementById('username').value;
            if(!user) return alert("Vendos nje emer!");
            localStorage.setItem('user', user);
            startApp();
        }

        function startApp() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-display').innerText = localStorage.getItem('user');
            
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:BTCEUR",
                "interval": "D",
                "theme": "dark",
                "container_id": "tradingview_chart"
            });
            fetchPrice();
        }

        function calculateCrypto() {
            const amount = document.getElementById('amount').value;
            if(amount > 0 && currentPrice > 0) {
                const estimate = amount / currentPrice;
                document.getElementById('estimate').innerText = "Do marrësh: " + estimate.toFixed(6) + " BTC";
            }
        }

        function trade(type) {
            const amountInput = document.getElementById('amount');
            const amountEUR = parseFloat(amountInput.value);

            if (type === 'buy') {
                if (amountEUR <= balance && amountEUR > 0) {
                    balance -= amountEUR;
                    cryptoBalance += amountEUR / currentPrice;
                    alert("Blerje e suksesshme!");
                } else { alert("Nuk ke mjaftueshëm para!"); }
            } else {
                const btcToSell = amountEUR / currentPrice;
                if (cryptoBalance >= btcToSell && amountEUR > 0) {
                    balance += amountEUR;
                    cryptoBalance -= btcToSell;
                    alert("Shitje e suksesshme!");
                } else { alert("Nuk ke mjaftueshëm BTC!"); }
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(2);
            document.getElementById('crypto-balance').innerText = cryptoBalance.toFixed(6);
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = () => { if(localStorage.getItem('user')) startApp(); };
    </script>
</body>
</html>
