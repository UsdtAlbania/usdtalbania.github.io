<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Albania | Professional Trading</title>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --panel: #1e2329; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }
        .auth-container { max-width: 400px; margin: 50px auto; padding: 30px; background: var(--panel); border-radius: 15px; text-align: center; border: 1px solid #333; }
        .logo-img { width: 150px; margin-bottom: 20px; border-radius: 50%; border: 2px solid var(--gold); }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #474d57; background: #2b3139; color: white; }
        button { width: 95%; padding: 12px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; border-radius: 6px; margin-top: 10px; }
        #main-app { display: none; }
        .header { background: #181a20; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b3139; }
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 15px; padding: 15px; }
        .trade-panel { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .stat-card { background: #2b3139; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .buy-btn { background: #0ecb81; color: white; }
        .sell-btn { background: #f6465d; color: white; }
        #live-price { font-size: 24px; color: var(--gold); font-weight: bold; margin: 10px 0; }
        .leverage-badge { background: #474d57; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-container">
        <img src="https://i.ibb.co/Y4X8V6Y/image.png" class="logo-img" alt="USDT Albania">
        <h2 style="color: var(--gold);">USDT Albania</h2>
        <input type="email" id="email" placeholder="Email (p.sh. test@test.com)">
        <input type="password" id="pass" placeholder="Fjalëkalimi">
        <button onclick="handleAuth('login')">HYR</button>
        <button style="background:transparent; color:gray; font-size:12px;" onclick="handleAuth('reg')">S'ke llogari? Regjistrohu</button>
    </div>

    <div id="main-app">
        <div class="header">
            <img src="https://i.ibb.co/Y4X8V6Y/image.png" height="40" style="border-radius:50%">
            <div id="user-info"></div>
            <button onclick="location.reload()" style="width:auto; padding:5px 10px; background:#333;">DIL</button>
        </div>

        <div class="grid">
            <div id="tradingview_chart" style="height: 650px;"></div>

            <div class="trade-panel">
                <div class="stat-card">
                    <small>BILANCI TOTAL (EUR)</small>
                    <h2 id="balance-eur">1,000.00 €</h2>
                </div>

                <div class="stat-card" style="border-left-color: #0ecb81;">
                    <small>POZICIONI AKTIV</small>
                    <div id="active-trade" style="font-size: 14px; margin-top:5px;">Nuk ka pozicion aktiv</div>
                </div>

                <label>Zgjidh Monedhën:</label>
                <select id="asset-select" onchange="updateChart()">
                    <option value="BTC">Bitcoin (BTC/EUR)</option>
                    <option value="ETH">Ethereum (ETH/EUR)</option>
                    <option value="SOL">Solana (SOL/EUR)</option>
                    <option value="BNB">Binance Coin (BNB/EUR)</option>
                </select>

                <label>Leva (Leverage):</label>
                <select id="leverage-select">
                    <option value="1">1:1 (Pa Levë)</option>
                    <option value="5">1:5</option>
                    <option value="15">1:15</option>
                    <option value="30">1:30</option>
                    <option value="50">1:50</option>
                </select>

                <div id="live-price">---.-- €</div>

                <input type="number" id="trade-amount" placeholder="Shuma e investimit (€)">
                
                <button class="buy-btn" onclick="openTrade('long')">BUY (LONG)</button>
                <button class="sell-btn" onclick="openTrade('short')">SELL (SHORT)</button>
                <button id="close-btn" style="display:none; background:#474d57;" onclick="closeTrade()">MBYLL POZICIONIN</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9tqFWgOWD8dSj8UAaGE_RFQnzKjD2mns",
            authDomain: "usdt-albania.firebaseapp.com",
            projectId: "usdt-albania",
            storageBucket: "usdt-albania.firebasestorage.app",
            messagingSenderId: "334664904932",
            appId: "1:334664904932:web:d3c80b79275cd900b43cf1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userUID = null;
        let userData = { eur: 1000, trade: null };
        let currentPrice = 0;

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                let res = type === 'login' ? await signInWithEmailAndPassword(auth, email, pass) : await createUserWithEmailAndPassword(auth, email, pass);
                userUID = res.user.uid;
                const snap = await getDoc(doc(db, "users", userUID));
                if(snap.exists()) userData = snap.data();
                else await setDoc(doc(db, "users", userUID), userData);
                
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('user-info').innerText = email;
                initApp();
            } catch (e) { alert("Gabim: " + e.message); }
        };

        function initApp() {
            updateUI();
            updateChart();
            setInterval(fetchPrice, 2000);
            setInterval(calculateLivePNL, 1000);
        }

        async function fetchPrice() {
            const symbol = document.getElementById('asset-select').value;
            const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}EUR`);
            const data = await res.json();
            currentPrice = parseFloat(data.price);
            document.getElementById('live-price').innerText = currentPrice.toLocaleString() + " €";
        }

        window.openTrade = async (direction) => {
            if(userData.trade) return alert("Mbyll pozicionin aktual para se të hapësh një të ri!");
            const amount = parseFloat(document.getElementById('trade-amount').value);
            const leverage = parseInt(document.getElementById('leverage-select').value);
            
            if(amount > userData.eur || !amount) return alert("Bilanc i pamjaftueshëm!");

            userData.trade = {
                entry: currentPrice,
                amount: amount,
                leverage: leverage,
                direction: direction,
                symbol: document.getElementById('asset-select').value
            };
            
            await updateDoc(doc(db, "users", userUID), userData);
            updateUI();
        };

        function calculateLivePNL() {
            if(!userData.trade) return;
            const t = userData.trade;
            let diff = t.direction === 'long' ? (currentPrice - t.entry) : (t.entry - currentPrice);
            let pnl = (diff / t.entry) * t.amount * t.leverage;
            
            document.getElementById('active-trade').innerHTML = `
                ${t.symbol} ${t.direction.toUpperCase()} x${t.leverage}<br>
                Fitimi/Humbja: <b style="color:${pnl >=0 ? '#0ecb81' : '#f6465d'}">${pnl.toFixed(2)} €</b>
            `;
            document.getElementById('close-btn').style.display = 'block';
        }

        window.closeTrade = async () => {
            const t = userData.trade;
            let diff = t.direction === 'long' ? (currentPrice - t.entry) : (t.entry - currentPrice);
            let pnl = (diff / t.entry) * t.amount * t.leverage;
            
            userData.eur += pnl;
            userData.trade = null;
            await updateDoc(doc(db, "users", userUID), userData);
            document.getElementById('close-btn').style.display = 'none';
            document.getElementById('active-trade').innerText = "Nuk ka pozicion aktiv";
            updateUI();
        };

        function updateUI() {
            document.getElementById('balance-eur').innerText = userData.eur.toLocaleString() + " €";
        }

        window.updateChart = () => {
            const sym = document.getElementById('asset-select').value;
            new TradingView.widget({
                "autosize": true, "symbol": `BINANCE:${sym}EUR`, "interval": "15", "theme": "dark", "container_id": "tradingview_chart"
            });
        };
    </script>
    <script src="https://s3.tradingview.com/tv.js"></script>
</body>
</html>
