<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Albania | Platforma Profesionale</title>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --panel: #1e2329; --up: #0ecb81; --down: #f6465d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* AUTH STYLING */
        .auth-container { max-width: 400px; margin: 40px auto; padding: 30px; background: var(--panel); border-radius: 15px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-img { width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 50%; border: 3px solid var(--gold); display: block; object-fit: cover; background: #000; }
        
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #474d57; background: #2b3139; color: white; outline: none; }
        button { width: 95%; padding: 12px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; border-radius: 6px; margin-top: 10px; color: black; }
        
        /* APP STYLING */
        #main-app { display: none; }
        .header { background: #181a20; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b3139; }
        .grid { display: grid; grid-template-columns: 1fr 340px; gap: 10px; padding: 10px; }
        .trade-panel { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .stat-card { background: #2b3139; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        #live-price { font-size: 26px; color: var(--gold); font-weight: bold; margin: 10px 0; }
        .pnl-pos { color: var(--up); } .pnl-neg { color: var(--down); }

        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-container">
        <img src="https://i.ibb.co/68032tS/usdtalbania.png" class="logo-img" alt="Logo">
        <h2 id="auth-title" style="color: var(--gold);">USDT Albania</h2>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Fjalëkalimi">
        
        <div id="login-tools">
            <button onclick="handleAuth('login')">HYR</button>
            <p style="font-size: 13px; color: gray;">S'ke llogari? <a href="#" onclick="toggleAuth(true)" style="color: var(--gold);">Regjistrohu</a></p>
        </div>

        <div id="register-tools" style="display: none;">
            <button onclick="handleAuth('reg')">KRIJO LLOGARI</button>
            <p style="font-size: 13px; color: gray;">Ke llogari? <a href="#" onclick="toggleAuth(false)" style="color: var(--gold);">Hyr këtu</a></p>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://i.ibb.co/68032tS/usdtalbania.png" height="35" style="border-radius:50%">
                <strong style="color:var(--gold)">USDT Albania</strong>
            </div>
            <div style="font-size:12px;"><span id="user-display"></span> | <a href="#" onclick="location.reload()" style="color:var(--gold)">Dil</a></div>
        </div>

        <div class="grid">
            <div id="tradingview_chart" style="height: 550px;"></div>
