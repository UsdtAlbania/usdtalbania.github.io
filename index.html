<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Demo Platform</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0e11; color: white; margin: 0; }
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: #1e2329; border-radius: 10px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #474d57; background: #2b3139; color: white; }
        button { width: 95%; padding: 12px; background-color: #f0b90b; border: none; border-radius: 5px; color: black; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #d9a508; }
        #dashboard { display: none; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #181a20; border-bottom: 1px solid #2b3139; }
        .logout-btn { width: auto; padding: 5px 15px; background: #f84960; color: white; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-container">
        <h2 id="form-title">Krijo Llogari Demo</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()" id="main-btn">Regjistrohu & Hyr</button>
        <p style="font-size: 12px; color: #848e9c; margin-top: 15px;">*Të dhënat ruhen vetëm në browser-in tuaj për qëllime demo.</p>
    </div>

    <div id="dashboard">
        <div class="header">
            <div><strong>Binance Clone Demo</strong> | Mirëseve Erdhe, <span id="user-display" style="color: #f0b90b;"></span></div>
            <button class="logout-btn" onclick="logout()">Dil</button>
        </div>

        <div class="tradingview-widget-container" style="margin-top: 10px;">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    {"proName": "BINANCE:BTCUSDT", "title": "BTC"},
                    {"proName": "BINANCE:ETHUSDT", "title": "ETH"},
                    {"proName": "BINANCE:BNBUSDT", "title": "BNB"}
                ],
                "colorTheme": "dark", "isTransparent": false, "displayMode": "adaptive", "locale": "en"
            }
            </script>
        </div>

        <div class="tradingview-widget-container" style="margin-top: 20px; height: 500px;">
            <div id="tradingview_chart" style="height: 500px;"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Funksioni për Login / Register
        function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user.length < 3 || pass.length < 3) {
                alert("Ju lutem vendosni një username dhe password më të gjatë!");
                return;
            }

            // Ruajmë përdoruesin në LocalStorage
            localStorage.setItem('demo_user', user);
            showDashboard(user);
        }

        function showDashboard(username) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('user-display').innerText = username;

            // Ngarkojmë grafikun pasi hapet dashboard
            new TradingView.widget({
                "width": "100%",
                "height": 500,
                "symbol": "BINANCE:BTCUSDT",
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "container_id": "tradingview_chart"
            });
        }

        function logout() {
            localStorage.removeItem('demo_user');
            location.reload();
        }

        // Kontrollo nëse përdoruesi është i loguar kur hapet faqja
        window.onload = function() {
            const savedUser = localStorage.getItem('demo_user');
            if (savedUser) {
                showDashboard(savedUser);
            }
        }
    </script>

</body>
</html>
